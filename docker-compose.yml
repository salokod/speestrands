services:
  robot-mcp:
    build:
      context: .
      dockerfile: docker/robot-mcp/Dockerfile
    environment:
      MCP_TRANSPORT: http
      MCP_HOST: "0.0.0.0"
    ports:
      - "8000:8000"

  asap:
    build:
      context: .
      dockerfile: docker/asap/Dockerfile
    environment:
      MCP_TRANSPORT: http
      MCP_HOST: "0.0.0.0"
    ports:
      - "8001:8000"
    volumes:
      - ./assemblies:/app/assemblies
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import socket; s=socket.socket(); s.connect(('localhost',8000)); s.close()\""]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 15s

  agent:
    build:
      context: .
      dockerfile: docker/agent/Dockerfile
    env_file:
      - .env
    volumes:
      - ./reports:/app/reports
    depends_on:
      robot-mcp:
        condition: service_started
      asap:
        condition: service_healthy
    command: ["python3", "examples/asap_agent.py"]
