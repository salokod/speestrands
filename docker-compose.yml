services:
  robot-mcp:
    build:
      context: .
      dockerfile: docker/robot-mcp/Dockerfile
    environment:
      MCP_TRANSPORT: http
      MCP_HOST: "0.0.0.0"
    ports:
      - "8000:8000"

  agent:
    build:
      context: .
      dockerfile: docker/agent/Dockerfile
    env_file:
      - .env
    volumes:
      - ./reports:/app/reports
    depends_on:
      - robot-mcp
    command: ["python3", "examples/robot_mcp_agent.py"]
